<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다음 회차 준비 중 · 무기견의 옵션 입문</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; --bg:#0b0d0c; --bg-card:#151715; --text:#f1eee5; --text-muted:#a49b8b; --text-dim:#746f65; --amber:#f5b14c; --border:#2d302a; --border-light:#44483d; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at top right,rgba(245,177,76,.08),transparent 34%),var(--bg); color:var(--text); font-family:'Noto Sans KR',system-ui,sans-serif; line-height:1.75; }
    main { width:min(640px,100%); border:1px solid var(--border-light); border-radius:18px; background:linear-gradient(135deg,var(--bg-card),#1d211d); padding:34px; box-shadow:0 24px 80px rgba(0,0,0,.32); }
    .eyebrow { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; color:var(--amber); text-transform:uppercase; margin-bottom:14px; }
    h1 { margin:0 0 14px; font-size:clamp(28px,7vw,44px); line-height:1.16; }
    p { margin:0 0 18px; color:var(--text-muted); }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }
    a { display:inline-flex; align-items:center; justify-content:center; min-height:44px; padding:0 16px; border-radius:999px; text-decoration:none; font-weight:900; }
    .primary { background:var(--amber); color:#11130f; }
    .secondary { border:1px solid var(--border-light); color:var(--text-muted); }
    .legal-footer { margin:26px 0 0; color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:12px; }
    .legal-footer a { display:inline; min-height:0; padding:0; border-radius:0; color:var(--amber); font-weight:700; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Next Session</div>
    <h1>다음 회차를 준비하고 있습니다</h1>
    <p>6회차는 아직 공개 전입니다. 공개가 완료되면 목차에서 바로 이어서 볼 수 있도록 열어두겠습니다.</p>
    <p>지금은 5회차까지 복습하면서 내가격, 등가격, 외가격과 내재가치의 연결을 먼저 정리해두면 좋습니다.</p>
    <div class="actions">
      <a class="primary" href="index.html#roadmap">공개 회차 확인하기</a>
      <a class="secondary" href="sessions/session-25.html">25회차로 돌아가기</a>
    </div>
    <p class="legal-footer">© 2026 무기견. All rights reserved. · <a href="copyright.html">저작권 및 이용 제한</a></p>
  </main>
</body>
</html>
